---
name: Android Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Sync Capacitor Android
        working-directory: frontend
        run: npx cap sync android

      - name: Grant Gradle permission
        run: chmod +x frontend/android/gradlew

      - name: Restore Android keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" \
          | base64 --decode \
          > frontend/android/app/release.keystore

      - name: Create keystore properties
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          cat > frontend/android/keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build Debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        working-directory: frontend/android
        run: ./gradlew assembleRelease --stacktrace

      - name: Build Release Bundle
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        working-directory: frontend/android
        run: ./gradlew bundleRelease --stacktrace

      - name: Upload APK and AAB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-builds
          path: |
            frontend/android/app/build/outputs/apk/**/*.apk
            frontend/android/app/build/outputs/bundle/**/*.aab
