name: Sync Git Objects

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build project
        shell: bash
        run: |
          echo "Starting build..."

          if [ -f requirements.txt ]; then
            python3 -m pip install -r requirements.txt
          fi

          if [ -f package.json ]; then
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
            npm run build --if-present
          fi

          echo "Build completed."

  sync:
    name: Sync Git Objects
    needs: build
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all Git objects
        shell: bash
        run: |
          git fetch --all --tags --prune

      - name: Verify repository
        shell: bash
        run: |
          git fsck --full
          git count-objects -v
          git branch -a
          git tag

      - name: Repository synchronized
        run: |
          echo "Git objects are synchronized."
