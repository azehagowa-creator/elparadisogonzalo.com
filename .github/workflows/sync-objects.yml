name: Sync Git Objects

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read

jobs:
  sync:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: max

      - name: Fetch all Git objects
        run: |
          git fetch --all --tags --prune

      - name: Verify repository
        run: |
          git fsck --full
          git gc --prune=now
          git count-objects -v
          git branch -a
          git tag

      - name: Repository synchronized
        run: echo "✅ Git objects are synchronized."
