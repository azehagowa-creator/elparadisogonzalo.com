name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Rollup native package
        working-directory: frontend
        run: npm install --save-dev @rollup/rollup-linux-x64-gnu || true

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Restore Android keystore
        working-directory: frontend/android
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/release.keystore

      - name: Create keystore.properties
        working-directory: frontend/android
        run: |
          cat > keystore.properties <<EOF
          storeFile=app/release.keystore
          storeType=PKCS12
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Verify keystore
        working-directory: frontend/android
        run: |
          test -f app/release.keystore
          ls -lh app/release.keystore

      - name: Make Gradle executable
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Build signed Release APK and AAB
        working-directory: frontend/android
        run: |
          ./gradlew clean
          ./gradlew assembleRelease bundleRelease --stacktrace --warning-mode all

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: frontend/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: frontend/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Upload mapping files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proguard-mapping
          path: frontend/android/app/build/outputs/mapping/
          if-no-files-found: ignore
